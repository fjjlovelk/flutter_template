name: flutter_template
description: "flutter_template"
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.5.3
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # 路由、状态管理
  get: ^4.7.2
  # 网络请求
  dio: ^5.8.0+1
  # 持久化存储
  shared_preferences: ^2.5.3
  # 屏幕单位适配
  flutter_screenutil: ^5.9.3
  # loading、toast
  flutter_easyloading: ^3.0.5
  # 权限管理
  permission_handler: ^12.0.0+1
  # 设备信息
  device_info_plus: ^11.4.0
  # 拍照
  image_picker: ^1.0.8
  # 生成唯一标识
  uuid: ^4.5.1
  # 相册选择
  wechat_assets_picker: ^9.5.1
  # 上拉加载，下拉刷新
  easy_refresh: ^3.4.0
  # dio 日志记录拦截器
  talker_dio_logger: ^4.8.2
  # toast
  oktoast: ^3.4.0
  # 控制台日志打印
  logger: ^2.5.0
  # 表单
  flutter_form_builder: ^10.0.1
  # 表单校验
  form_builder_validators: ^11.1.2
  # 时间选择
  flutter_picker_plus: ^1.5.2
  # 动画
  flutter_animate: ^4.5.2
  # 日期格式化
  intl: ^0.20.2
  # 汉字转拼音
  pinyin: ^3.3.0
  tdesign_flutter: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # 多环境配置
  flutter_flavorizr: ^2.2.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/
